<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account | MitM Beta Camp Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <style>

        .account-page {






    background-image: url('/static/images/background.png'); 
            
    background-repeat: no-repeat; 
            
    background-size: auto, 100vh; 
            
    background-position: 0vw -35vh; 
            
    background-attachment: fixed; 

    background-repeat: repeat;
    
    animation: loopBackground 120s linear infinite; 
}

@keyframes loopBackground {
    from {
        background-position: 0 0vh;
    }
    to {
        background-position: 100vw 0vh; 
    }
}

    .account-panel {
        
            background: rgba(201, 225, 225, 0.603);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
    }
    </style>
    {% include '_top_bar.html' %}
    <main class="account-page">
        <section class="account-panel">
            <div class="account-profile">
                {% if user.picture %}
                    <img class="account-avatar" src="{{ user.picture }}" alt="">
                {% else %}
                    <div class="account-avatar account-avatar-fallback" aria-hidden="true">
                        {{ (user.name or user.email or 'U')[:1] }}
                    </div>
                {% endif %}
                <div>
                    <h1>{{ user.name or 'Your account' }}</h1>
                    <p>{{ user.email }}</p>
                </div>
            </div>

            <div class="account-details">
                <div>
                    <span class="account-label">Signed in with</span>
                    <strong>Google</strong>
                </div>
                <div>
                    <span class="account-label">Profile name</span>
                    <strong>{{ user.name or 'Not provided' }}</strong>
                </div>
            </div>

            <div class="account-actions">
                <a class="account-button account-button-primary" href="/videos">Go to videos</a>
                <form method="post" action="/logout">
                    <button class="account-button" type="submit">Sign out</button>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
